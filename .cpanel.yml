---
deployment:
  tasks:
    - export DEPLOYPATH=/home/ecoguz/tecnologico.ecoguz.com
    # 1. Borrar todo excepto la carpeta api y los archivos .htaccess
    - find $DEPLOYPATH -mindepth 1 \( -name "api" -o -name ".htaccess" \) -prune -o -exec rm -rf {} \; 2>/dev/null || true
    # 2. Copiar la nueva build
    - /bin/cp -R dist/* $DEPLOYPATH
    # 3. Permisos
    - chmod -R 755 $DEPLOYPATH
